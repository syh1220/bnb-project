<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>화면 폭 측정</title>
</head>
<body style="margin:0;padding:40px;font-size:24px;font-family:sans-serif;">
  <div id="result">측정 중...</div>
  <script>
    document.getElementById('result').innerHTML =
      'window.innerWidth: ' + window.innerWidth + 'px<br>' +
      'document.documentElement.clientWidth: ' + document.documentElement.clientWidth + 'px<br>' +
      'devicePixelRatio: ' + window.devicePixelRatio;
  </script>
</body>
</html>
